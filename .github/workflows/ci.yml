name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run test
      - run: npm run build
        env:
          SESSION_SECRET: ci-test-session-secret-minimum-32-chars-long
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
        env:
          CI: true
          SESSION_SECRET: ci-test-session-secret-minimum-32-chars-long