# Render Blueprint — one-click pilot deployment
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: proxima-gov
    runtime: docker
    plan: starter
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB
        value: proxima_gov